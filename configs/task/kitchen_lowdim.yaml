# ============================================================
# Task: FrankaKitchen (D4RL) low-dimensional
# ============================================================
name: kitchen_lowdim

env_suite: kitchen
modality: lowdim
dataset_source: kitchen
supports_pretrain: true
supports_finetune: false
obs_dim: 60
action_dim: 9
horizon_steps: 16
n_obs_steps: 2
n_action_steps: 8

policy:
  _target_: dbpo.methods.dbp.policies.LowdimDBPPolicy
  obs_dim: ${task.obs_dim}
  action_dim: ${task.action_dim}
  horizon: ${task.horizon_steps}
  n_action_steps: ${task.n_action_steps}
  n_obs_steps: ${task.n_obs_steps}
  temperatures: ${model.temperatures}
  gen_per_label: ${model.gen_per_label}
  per_timestep_loss: ${model.per_timestep_loss}
  backbone_kwargs: ${model.backbone}

finetune_actor: ${task.policy}

train_dataset:
  _target_: dbpo.dataset.kitchen_dataset.KitchenLowdimDataset
  dataset_dir: ${oc.env:DBPO_DATA_DIR}/kitchen
  horizon: ${task.horizon_steps}
  pad_before: 1
  pad_after: 7
  seed: ${seed}
  val_ratio: 0.02

runner:
  _target_: dbpo.envs.runners.kitchen_runner.KitchenLowdimRunner
  output_dir: ${logdir}
  dataset_dir: ${oc.env:DBPO_DATA_DIR}/kitchen
  n_train: 10
  n_train_vis: 3
  n_test: 22
  n_test_vis: 6
  max_steps: 280
  n_obs_steps: ${task.n_obs_steps}
  n_action_steps: ${task.n_action_steps}

# Vectorised env config (for PPO fine-tuning)
env_cfg:
  name: kitchen
  env_type: kitchen
  n_envs: 40
  max_episode_steps: 280
  best_reward_threshold_for_success: 4.0
  wrappers:
    multi_step:
      n_obs_steps: ${task.n_obs_steps}
      n_action_steps: ${task.n_action_steps}
      max_episode_steps: 280
      reset_within_step: true
