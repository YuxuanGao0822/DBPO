# ============================================================
# Task: PushT low-dimensional (keypoint observations)
# ============================================================
name: pusht_lowdim

env_suite: pusht
modality: lowdim
dataset_source: pusht
supports_pretrain: true
supports_finetune: false
obs_dim: 20                     # 9 keypoints * 2 + 2 agent_pos
action_dim: 2
horizon_steps: 16
n_obs_steps: 2
n_action_steps: 8

policy:
  _target_: dbpo.methods.dbp.policies.LowdimDBPPolicy
  obs_dim: ${task.obs_dim}
  action_dim: ${task.action_dim}
  horizon: ${task.horizon_steps}
  n_action_steps: ${task.n_action_steps}
  n_obs_steps: ${task.n_obs_steps}
  temperatures: ${model.temperatures}
  gen_per_label: ${model.gen_per_label}
  per_timestep_loss: ${model.per_timestep_loss}
  backbone_kwargs: ${model.backbone}

finetune_actor: ${task.policy}

train_dataset:
  _target_: dbpo.dataset.pusht_dataset.PushTLowdimDataset
  zarr_path: ${oc.env:DBPO_DATA_DIR}/pusht/pusht_cchi_v7_replay.zarr
  horizon: ${task.horizon_steps}
  pad_before: 1
  pad_after: 7
  seed: ${seed}
  val_ratio: 0.02

runner:
  _target_: dbpo.env_runner.pusht_keypoints_runner.PushTKeypointsRunner
  output_dir: ${logdir}
  n_train: 10
  n_train_vis: 3
  n_test: 22
  n_test_vis: 6
  max_steps: 300
  n_obs_steps: ${task.n_obs_steps}
  n_action_steps: ${task.n_action_steps}

# Vectorised env config (for PPO fine-tuning)
env_cfg:
  name: pusht
  env_type: pusht
  n_envs: 40
  max_episode_steps: 300
  best_reward_threshold_for_success: 1.0
  wrappers:
    multi_step:
      n_obs_steps: ${task.n_obs_steps}
      n_action_steps: ${task.n_action_steps}
      max_episode_steps: 300
      reset_within_step: true
