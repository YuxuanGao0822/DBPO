name: kitchen_lowdim_abs

env_suite: kitchen
modality: lowdim
dataset_source: kitchen
supports_pretrain: true
supports_finetune: false
obs_dim: 60
action_dim: 9
horizon_steps: 4
n_obs_steps: 2
n_action_steps: 4
abs_action: true
robot_noise_ratio: 0.1

policy:
  _target_: dbpo.methods.dbp.policies.LowdimDBPPolicy
  obs_dim: ${task.obs_dim}
  action_dim: ${task.action_dim}
  horizon: ${task.horizon_steps}
  n_action_steps: ${task.n_action_steps}
  n_obs_steps: ${task.n_obs_steps}
  temperatures: ${model.temperatures}
  gen_per_label: ${model.gen_per_label}
  per_timestep_loss: ${model.per_timestep_loss}
  backbone_kwargs: ${model.backbone}

train_dataset:
  _target_: dbpo.dataset.kitchen_mjl_dataset.KitchenMjlLowdimDataset
  dataset_dir: ${oc.env:DBPO_DATA_DIR}/kitchen/kitchen_demos_multitask
  horizon: ${task.horizon_steps}
  pad_before: 1
  pad_after: 3
  abs_action: ${task.abs_action}
  robot_noise_ratio: ${task.robot_noise_ratio}
  seed: ${seed}
  val_ratio: 0.02

runner:
  _target_: dbpo.envs.runners.kitchen_runner.KitchenLowdimRunner
  output_dir: ${logdir}
  dataset_dir: ${oc.env:DBPO_DATA_DIR}/kitchen
  n_train: 6
  n_train_vis: 2
  n_test: 50
  n_test_vis: 4
  max_steps: 280
  n_obs_steps: ${task.n_obs_steps}
  n_action_steps: ${task.n_action_steps}
  render_hw: [240, 360]
  fps: 12.5
  abs_action: ${task.abs_action}
  robot_noise_ratio: ${task.robot_noise_ratio}

env_cfg:
  name: kitchen-all-v0
  env_type: kitchen
  n_envs: 40
  max_episode_steps: 280
  best_reward_threshold_for_success: 1.0
  wrappers:
    multi_step:
      n_obs_steps: ${task.n_obs_steps}
      n_action_steps: ${task.n_action_steps}
      max_episode_steps: 280
      reset_within_step: true
