defaults:
  - _self_
  - task: can_lowdim
  - model: default

_target_: dbpo.workspaces.pretrain.DBPPretrainWorkspace

hydra:
  run:
    dir: ${logdir}
  job:
    chdir: false

name: dbp_pretrain_${task.name}_seed${seed}
logdir: outputs/${name}/${now:%Y-%m-%d}/${now:%H-%M-%S}

seed: 42
device: cuda:0

policy: ${task.policy}
train_dataset: ${task.train_dataset}
env_runner: ${task.runner}

train:
  n_epochs: 500
  batch_size: 64
  learning_rate: 1.0e-4
  weight_decay: 1.0e-6
  num_workers: 4
  lr_scheduler:
    first_cycle_steps: 500
    warmup_steps: 100
    min_lr: 1.0e-5
  save_model_freq: 500
  log_freq: 1
  val_freq: 100
  update_ema_freq: 10
  epoch_start_ema: 20

ema:
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

wandb:
  entity: null
  project: dbp-${task.name}
  run: ${now:%H-%M-%S}_${name}
  offline_mode: false
  dir: ./wandb
